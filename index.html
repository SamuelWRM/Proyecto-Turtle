<!doctype html>
<html lang="es">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Proyecto NVR</title>
    <style>
      :root {
        --bg: #212529;
        --surface: #2c3034;
        --border: #373b3e;
        --text: #dee2e6;
        --muted: #6c757d;
        --accent: #0dcaf0;
        --white: #f8f9fa;
      }

      * {
        box-sizing: border-box;
        margin: 0;
        padding: 0;
      }

      html,
      body {
        height: 100%;
        font-family:
          -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
      }

      body {
        background: var(--bg);
        color: var(--text);
        display: flex;
        flex-direction: column;
        min-height: 100vh;
      }

      header {
        background: var(--surface);
        border-bottom: 1px solid var(--border);
        padding: 12px 24px;
        display: flex;
        align-items: center;
        justify-content: space-between;
      }

      header h1 {
        font-size: 1.4rem;
        font-weight: 600;
        color: var(--white);
      }

      nav {
        display: flex;
        gap: 8px;
      }

      .nav-link {
        color: var(--muted);
        text-decoration: none;
        font-size: 0.875rem;
        padding: 6px 14px;
        border-radius: 4px;
        transition:
          background 0.15s,
          color 0.15s;
      }

      .nav-link:hover {
        background: var(--border);
        color: var(--white);
      }

      .nav-link.active {
        color: var(--white);
      }

      .main-layout {
        display: flex;
        flex: 1;
        gap: 12px;
        padding: 12px;
      }

      .primary-col {
        flex: 1;
        min-width: 0;
      }

      .side-col {
        width: 320px;
        flex-shrink: 0;
        display: flex;
        flex-direction: column;
        gap: 10px;
      }

      .cam-box {
        background: #000;
        border-radius: 6px;
        overflow: hidden;
        border: 1px solid var(--border);
        position: relative;
      }

      .cam-label {
        position: absolute;
        top: 8px;
        left: 8px;
        background: rgba(0, 0, 0, 0.65);
        color: var(--accent);
        font-size: 0.7rem;
        padding: 2px 8px;
        border-radius: 3px;
        letter-spacing: 0.5px;
        z-index: 10;
      }

      #streamImg {
        width: 100%;
        display: block;
        min-height: 500px;
        object-fit: cover;
        background: #000;
      }

      .secondary-img {
        width: 100%;
        display: block;
        height: 160px;
        object-fit: cover;
        background: #000;
      }

      footer {
        border-top: 1px solid var(--border);
        padding: 12px 24px;
        display: flex;
        justify-content: space-between;
        align-items: center;
        background: var(--surface);
      }

      .footer-text {
        font-size: 0.8rem;
        color: var(--muted);
      }
    </style>
  </head>
  <body>
    <!-- Header -->
    <header>
      <h1>Proyecto NVR</h1>
      <nav>
        <a href="index.html" class="nav-link active">En Vivo</a>
        <a href="Grabaciones.html" class="nav-link">Grabaciones</a>
        <a href="SpaceInvaders.html" class="nav-link">Juegos</a>
      </nav>
    </header>

    <!-- Layout principal -->
    <div class="main-layout">
      <!-- Cámara principal -->
      <div class="primary-col">
        <div class="cam-box">
          <span class="cam-label">CAM 6</span>
          <img
            id="streamImg"
            src="https://cooperative-miss-action-merchandise.trycloudflare.com/cam6"
          />
        </div>
      </div>

      <!-- Panel lateral con cámaras secundarias -->
      <div class="side-col">
        <div class="cam-box">
          <span class="cam-label">CAM 1</span>
          <img
            class="secondary-img"
            src="https://infinite-aim-glasses-residents.trycloudflare.com/cam6"
          />
        </div>

        <div class="cam-box">
          <span class="cam-label">CAM 2</span>
          <img
            class="secondary-img"
            src="https://infinite-aim-glasses-residents.trycloudflare.com/cam3"
          />
        </div>

        <div class="cam-box">
          <span class="cam-label">CAM 3</span>
          <img
            class="secondary-img"
            src="https://infinite-aim-glasses-residents.trycloudflare.com/cam4"
          />
        </div>

        <div class="cam-box">
          <span class="cam-label">CAM 4</span>
          <img
            class="secondary-img"
            src="https://infinite-aim-glasses-residents.trycloudflare.com/cam5"
          />
        </div>

        <div class="cam-box">
          <span class="cam-label">CAM 5</span>
          <img
            class="secondary-img"
            src="https://infinite-aim-glasses-residents.trycloudflare.com/cam2"
          />
        </div>
      </div>
    </div>

    <!-- Footer -->
    <footer>
      <span class="footer-text"
        >© 2026 UAT RODHE | Ingenieria en Sistemas Computacionales 4 "J"</span
      >
      <span class="footer-text" id="reloj"></span>
    </footer>

    <script>
      function actualizarReloj() {
        document.getElementById("reloj").textContent =
          new Date().toLocaleTimeString("es-MX");
      }
      setInterval(actualizarReloj, 1000);
      actualizarReloj();
    </script>
  </body>
</html>
